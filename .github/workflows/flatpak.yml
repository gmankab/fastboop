name: flatpak
on:
  workflow_dispatch: {}
  workflow_call: {}
jobs:
  flatpak:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: x86_64
          - runner: ubuntu-24.04-arm
            arch: aarch64
    runs-on: ${{ matrix.runner }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
    steps:
      - uses: actions/checkout@v6
      - name: build
        run: |
          sudo flatpak-builder --disable-rofiles-fuse --install-deps-from=flathub --repo=repo build flatpak/win.fastboop.fastboop.yml
          sudo flatpak build-bundle repo win.fastboop.fastboop-${{ matrix.arch }}.flatpak win.fastboop.fastboop
      - name: upload
        uses: actions/upload-artifact@v4
        with:
          path: fastboop-${{ matrix.arch }}.flatpak
